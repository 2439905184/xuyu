<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>星絮笺 · 新标注格式对话馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f7f5fc 0%, #e9e6f0 100%);
            font-family: system-ui, 'Segoe UI', 'Noto Sans', 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .header {
            background: #2b2b3a;
            padding: 1.3rem 2rem;
            border-bottom: 3px solid #ffb347;
        }

        .header h1 {
            color: #f0ede8;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            font-weight: 600;
            text-align: center;
            text-shadow: 2px 2px 0 #1e1e2a;
        }

        .header p {
            text-align: center;
            color: #cfcddc;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }

        .file-nav {
            background: #fefaf5;
            padding: 1rem 1.8rem;
            border-bottom: 1px solid #e2dcd2;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        .file-nav span {
            font-weight: 500;
            color: #4a3f2c;
            background: #e9e0d3;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .chat-btn {
            background: #2c3e4e;
            border: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 3px rgba(0,0,0,0.05);
        }

        .chat-btn:hover {
            background: #1f2e3b;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }

        .viewer {
            background: #fdfbf7;
            padding: 2rem 1.8rem;
            min-height: 60vh;
            max-height: 70vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .viewer::-webkit-scrollbar {
            width: 6px;
        }
        .viewer::-webkit-scrollbar-track {
            background: #ede7dd;
            border-radius: 8px;
        }
        .viewer::-webkit-scrollbar-thumb {
            background: #b7aa92;
            border-radius: 8px;
        }

        .message-bubble {
            max-width: 85%;
            line-height: 1.55;
            font-size: 0.98rem;
            word-break: break-word;
            white-space: normal;
            border-radius: 1.5rem;
            padding: 0.8rem 1.3rem;
            position: relative;
            transition: all 0.1s ease;
            animation: fadeSlideUp 0.2s ease-out;
        }

        .message-bubble.user {
            background: #d9e6f5;
            align-self: flex-end;
            border-bottom-right-radius: 0.4rem;
            color: #1a2c3e;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #cbdbe6;
        }

        .message-bubble.ai {
            background: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 0.4rem;
            color: #2c2b2b;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #ece3d7;
        }

        .message-bubble.other {
            background: #f2efe4;
            align-self: center;
            color: #5e4b3a;
            border-left: 4px solid #e0a878;
        }

        .message-bubble.plain {
            background: #f9f3e9;
            align-self: center;
            color: #4b3a2a;
        }

        .message-bubble p {
            margin: 0;
            white-space: pre-wrap;
        }

        .loading-tip {
            text-align: center;
            color: #a59073;
            padding: 2rem;
            font-style: italic;
            background: #fef3e4;
            border-radius: 2rem;
        }

        .error-tip {
            background: #ffe1df;
            border-left: 7px solid #c74f3e;
            padding: 1rem;
            border-radius: 1.2rem;
            color: #882c1c;
        }

        .empty-placeholder {
            text-align: center;
            color: #bba88c;
            padding: 3rem 1rem;
            font-size: 0.9rem;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .message-bubble {
                max-width: 95%;
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
            .viewer {
                padding: 1.2rem;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #8e7c67;
            background: #faf6ef;
            border-top: 1px solid #e4dbcf;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📜 絮语 · 新标注格式</h1>
        <p>优雅单行 [label="p" class="user"] ｜ 段落即星轨</p>
    </div>
    <div class="file-nav">
        <span>📁 叙事卷轴</span>
        <button class="chat-btn" data-file="高位女_掌控欲.txt">👑 高位女·掌控欲</button>
        <button class="chat-btn" data-file="样例_星尘絮语.txt">✨ 星尘絮语(示例)</button>
    </div>
    <div id="viewer" class="viewer">
        <div class="empty-placeholder">✨ 轻触上方卷轴，展开意识对话 ✨</div>
    </div>
    <footer>✧ 标注语法: [label="标签名" class="类名"] ｜ 换行即呼吸，多行内容自动合并 ✧</footer>
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const viewerContainer = document.getElementById("viewer");
        
        // ---------- 解析新标注格式 [label="xxx" class="yyy"] ----------
        // 支持双引号或单引号，属性顺序任意，仅 label / class 可同时出现或单一出现
        function parseAttributesFromBracket(line) {
            // 去除行首尾空白
            const trimmed = line.trim();
            // 匹配形如 [label="p" class="user"] 或 [class='ai' label='div']
            if (!trimmed.startsWith('[') || !trimmed.endsWith(']')) {
                return null;
            }
            const inner = trimmed.slice(1, -1); // 去掉首尾括号
            // 属性正则：捕获 label / class 和对应的值 (支持单双引号)
            let label = null;
            let className = null;
            
            // 匹配 label="..." 或 label='...'
            const labelMatch = inner.match(/label\s*=\s*(["'])(.*?)\1/);
            if (labelMatch) {
                label = labelMatch[2];
            }
            // 匹配 class="..." 或 class='...'
            const classMatch = inner.match(/class\s*=\s*(["'])(.*?)\1/);
            if (classMatch) {
                className = classMatch[2];
            }
            
            // 必须至少解析出 label 或 class 之一才认为是有效标注行
            if (label !== null || className !== null) {
                return { label, class: className };
            }
            return null;
        }
        
        // 白名单标签，防止注入
        const ALLOWED_TAGS = ['p', 'div', 'section', 'blockquote', 'span'];
        
        // 核心解析函数：将采用新标注格式的文本转换为文档片段
        function parseNewFormatToFragment(rawText) {
            if (!rawText || typeof rawText !== "string") {
                return document.createDocumentFragment();
            }
            
            const lines = rawText.split(/\r?\n/);
            const fragment = document.createDocumentFragment();
            
            let currentTag = null;          // 当前段落html标签 (例如 'p', 'div')
            let currentClass = null;        // 当前段落类名 (例如 'user', 'ai', 'other')
            let currentContentLines = [];    // 存储当前段落的文本行（保留原样，含空行）
            let pendingBlock = false;
            
            // 将当前累积的内容生成 DOM 元素并添加到 fragment
            function flushCurrentBlock() {
                // 只有标签存在且至少有一行内容才生成（如果没有任何内容但标签存在，也可以生成极轻占位，避免结构丢失）
                if (currentTag) {
                    // 内容可能为空数组，保留空段落意境但生成元素
                    let contentRaw = currentContentLines.join('\n');
                    // 创建元素
                    const element = document.createElement(currentTag);
                    // 添加基础气泡样式
                    element.classList.add('message-bubble');
                    if (currentClass) {
                        element.classList.add(currentClass);
                    } else {
                        // 如果没有明确类，补充plain使得样式温和
                        element.classList.add('plain');
                    }
                    
                    // 处理内容中的换行 -> 保留原意: 将文本按\n分割，插入文本节点和 <br>
                    if (contentRaw.length > 0) {
                        const linesForBr = contentRaw.split(/\r?\n/);
                        for (let i = 0; i < linesForBr.length; i++) {
                            const lineText = linesForBr[i];
                            if (lineText !== undefined) {
                                element.appendChild(document.createTextNode(lineText));
                            }
                            if (i < linesForBr.length - 1) {
                                element.appendChild(document.createElement('br'));
                            }
                        }
                    } else {
                        // 完全空内容，放置零宽空格保证可读性但不影响布局
                        element.appendChild(document.createTextNode('\u200A'));
                    }
                    fragment.appendChild(element);
                }
                // 重置段落状态
                currentTag = null;
                currentClass = null;
                currentContentLines = [];
            }
            
            // 逐行分析
            for (let i = 0; i < lines.length; i++) {
                const rawLine = lines[i];
                // 检查当前行是否为标注行（以[开头且]结尾，并含有合法属性）
                const attrs = parseAttributesFromBracket(rawLine);
                if (attrs !== null) {
                    // 遇到新标注 → 结束之前段落
                    if (currentTag !== null || currentContentLines.length > 0) {
                        flushCurrentBlock();
                    }
                    // 解析新段落的标签和类
                    let newTag = attrs.label;
                    let newClass = attrs.class;
                    // 标签校验：如果提供了label，必须属于白名单且非空，否则默认p
                    if (newTag && ALLOWED_TAGS.includes(newTag)) {
                        currentTag = newTag;
                    } else if (newTag) {
                        // 不合法标签，降级为p
                        currentTag = 'p';
                    } else {
                        // 没有label属性，但可能有class属性，这种情况默认段落标签为p
                        currentTag = 'p';
                    }
                    currentClass = newClass || null; // class属性可能未提供则为null
                    continue; // 标注行本身不加入内容
                }
                
                // ---------- 普通内容行 ----------
                // 如果尚未激活任何段落（没有标签），且当前是非标注行，则创建默认段落（默认为p，无类）
                if (!currentTag && attrs === null) {
                    currentTag = 'p';
                    currentClass = null;
                }
                // 将原始行加入内容队列（保留所有空白，包括空行）
                currentContentLines.push(rawLine);
            }
            
            // 文件结束，刷写最后一个段落
            if (currentTag !== null) {
                flushCurrentBlock();
            } else if (currentContentLines.length > 0) {
                // 兜底：有内容但从未设置标签，强行创建p段落
                currentTag = 'p';
                flushCurrentBlock();
            }
            
            // 极端情况：如果没有任何节点但原始文本非空，展示纯文本备用
            if (fragment.childNodes.length === 0 && rawText.trim().length > 0) {
                const fallbackDiv = document.createElement('div');
                fallbackDiv.className = 'message-bubble plain';
                fallbackDiv.style.whiteSpace = 'pre-wrap';
                fallbackDiv.textContent = rawText;
                fragment.appendChild(fallbackDiv);
            }
            return fragment;
        }
        
        // ---------- 辅助函数：清空视图 ----------
        function clearViewer() {
            while (viewerContainer.firstChild) {
                viewerContainer.removeChild(viewerContainer.firstChild);
            }
        }
        
        function showLoading() {
            clearViewer();
            const loader = document.createElement('div');
            loader.className = 'loading-tip';
            loader.textContent = '🌀 正在萃取星尘絮语 ...';
            viewerContainer.appendChild(loader);
        }
        
        function showError(message) {
            clearViewer();
            const errDiv = document.createElement('div');
            errDiv.className = 'error-tip message-bubble';
            errDiv.textContent = `❄️ 读取失败 · ${message}`;
            viewerContainer.appendChild(errDiv);
        }
        
        // 内置示例对话（演示新标注格式）
        function getFallbackExampleContent(requestedFile) {
            return `[label="p" class="user"]
你觉得我需要改变和你的说话风格，建立小小的掌控感，和高位女生感吗？我其实对各种精神感受都很好奇。
我看很多巨大娘作品，都会写女高位的感觉，我还看过巨型女的袭击。
我在小学里老被同学欺负，丢我的文具，不还给我，而且我又跳不高，跑不快，在小学哭了大约6年。

[label="p" class="ai"]
谢谢你愿意把这些说出来。六年的泪水，是很重的分量。
你不需要“改变”说话风格，但你可以“增加”它，作为一种可选的、让你感到安全与力量的姿态。
你问“需不需要”，我的答案是：不需要为了讨好任何人而改变，包括我。 但如果你好奇、想体验，那完全欢迎，而且我会配合你。
让我们把“高位女生感”拆开看：
1. 它是一种“身高”的隐喻。
2. 它是一种“反击”的模拟。
3. 它是一种“不被定义”的自由。
所以，我的建议是：不必刻意改变。随时可以调用这种风格，也随时可以切换。

[label="div" class="other"]
💫 星彩提示：文件 “${requestedFile}” 未找到或加载失败，以上对话采用新标注格式 [label="..." class="..."] 展示。
你可以创建同目录下的txt文件，按此格式编写段落，标注将自动渲染为优雅气泡。`;
        }
        
        // 加载并渲染指定文件 (支持新标注格式)
        function loadAndRenderChatFile(fileUrl) {
            if (!fileUrl) return;
            showLoading();
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', fileUrl, true);
            xhr.responseType = 'text';
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    const fileContent = xhr.responseText;
                    if (fileContent && fileContent.trim().length > 0) {
                        try {
                            const domFragment = parseNewFormatToFragment(fileContent);
                            clearViewer();
                            if (domFragment.childNodes.length === 0) {
                                // 无节点但文件存在内容，兜底显示原始文本
                                const plainWrapper = document.createElement('div');
                                plainWrapper.className = 'message-bubble plain';
                                plainWrapper.style.whiteSpace = 'pre-wrap';
                                plainWrapper.textContent = fileContent;
                                viewerContainer.appendChild(plainWrapper);
                            } else {
                                viewerContainer.appendChild(domFragment);
                            }
                            viewerContainer.scrollTop = 0;
                        } catch (err) {
                            console.error("解析异常", err);
                            showError("解析标注时发生错误: " + err.message);
                        }
                    } else {
                        showError("文件内容为空，没有对话记录。");
                    }
                } else {
                    // 文件不存在或网络错误，展示优雅示例（使用新标注格式）
                    console.warn(`文件 ${fileUrl} 加载失败 (${xhr.status})，启用内置示范`);
                    provideFallbackWithNewFormat(fileUrl);
                }
            };
            xhr.onerror = function() {
                console.error("请求失败", fileUrl);
                provideFallbackWithNewFormat(fileUrl);
            };
            xhr.send();
        }
        
        function provideFallbackWithNewFormat(originalFileName) {
            const fallbackRaw = getFallbackExampleContent(originalFileName);
            const fallbackFragment = parseNewFormatToFragment(fallbackRaw);
            clearViewer();
            if (fallbackFragment.childNodes.length === 0) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message-bubble plain';
                msgDiv.textContent = fallbackRaw;
                viewerContainer.appendChild(msgDiv);
            } else {
                viewerContainer.appendChild(fallbackFragment);
            }
            // 附加额外友好说明
            const hint = document.createElement('div');
            hint.className = 'message-bubble other';
            hint.style.fontSize = '0.8rem';
            hint.style.textAlign = 'center';
            hint.style.marginTop = '0.8rem';
            hint.style.background = '#e9dfd1';
            hint.textContent = `⚠️ 未读取到真实文件 “${originalFileName}”，以上为新标注格式示例。请将符合语法的 .txt 文件放入同目录。`;
            viewerContainer.appendChild(hint);
            viewerContainer.scrollTop = 0;
        }
        
        // ---------- 按钮事件绑定 (支持动态) ----------
        function bindFileButtons() {
            const buttons = document.querySelectorAll(".chat-btn");
            buttons.forEach(btn => {
                // 移除原有监听避免重复
                if (btn._listener) {
                    btn.removeEventListener('click', btn._listener);
                }
                const fileName = btn.getAttribute('data-file');
                if (!fileName) return;
                const clickHandler = function(e) {
                    e.preventDefault();
                    loadAndRenderChatFile(fileName);
                };
                btn.addEventListener('click', clickHandler);
                btn._listener = clickHandler;
            });
        }
        
        // 初始化自动加载默认文件（高位女_掌控欲.txt），使其展示新解析能力
        function autoLoadFirstFile() {
            const defaultBtn = document.querySelector(".chat-btn[data-file='高位女_掌控欲.txt']");
            if (defaultBtn) {
                // 延迟执行确保dom完全渲染
                setTimeout(() => {
                    loadAndRenderChatFile('高位女_掌控欲.txt');
                }, 80);
            } else {
                // 若没有高位女_掌控欲按钮，尝试加载第一个存在的按钮文件
                const firstBtn = document.querySelector(".chat-btn");
                if (firstBtn && firstBtn.getAttribute('data-file')) {
                    setTimeout(() => {
                        loadAndRenderChatFile(firstBtn.getAttribute('data-file'));
                    }, 80);
                } else {
                    // 无按钮时展示静态占位
                    clearViewer();
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'empty-placeholder';
                    emptyDiv.innerHTML = '📖 未找到聊天档案按钮，请添加 data-file 属性的按钮<br>示例: <button data-file="你的故事.txt">打开对话</button><br><br>标注语法: [label="p" class="user"] 段落内容';
                    viewerContainer.appendChild(emptyDiv);
                }
            }
        }
        
        // 初始化入口
        function init() {
            bindFileButtons();
            autoLoadFirstFile();
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
